name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }} restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        # run: dotnet restore Banking.API/Banking.API.csproj
        run: dotnet restore banking.sln

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test --no-build --configuration Release

      - name: Build Docker image
        run: |
          docker build \
            --file Dockerfile \
            --tag banking-api:${{ github.sha }} \
            .

      # optionally push to GitHub Container Registry if GITHUB_TOKEN secret is set
